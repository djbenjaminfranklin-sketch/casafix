<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FCD34D"/>
      <stop offset="100%" style="stop-color:#F59E0B"/>
    </linearGradient>
    <linearGradient id="red" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#EF4444"/>
      <stop offset="100%" style="stop-color:#B91C1C"/>
    </linearGradient>
  </defs>

  <!-- Background - smooth rounded square -->
  <rect x="20" y="20" width="472" height="472" rx="105" fill="url(#bg)"/>

  <!-- Subtle inner glow -->
  <rect x="40" y="40" width="432" height="432" rx="90" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="2"/>

  <!-- House + Wrench combined icon -->
  <!-- House base -->
  <rect x="170" y="228" width="172" height="130" rx="14" fill="#FFFFFF"/>

  <!-- Roof -->
  <path d="M256 125 L385 235 L370 252 L256 155 L142 252 L127 235 Z" fill="url(#red)"/>

  <!-- Door - arch shape -->
  <rect x="230" y="290" width="52" height="68" rx="26" fill="url(#red)"/>

  <!-- Window left -->
  <rect x="182" y="252" width="36" height="30" rx="6" fill="#FEF3C7" stroke="#F59E0B" stroke-width="2"/>

  <!-- Window right -->
  <rect x="294" y="252" width="36" height="30" rx="6" fill="#FEF3C7" stroke="#F59E0B" stroke-width="2"/>

  <!-- Wrench - tilted, coming from behind roof -->
  <g transform="translate(320, 100) rotate(35, 0, 60)">
    <rect x="-6" y="0" width="12" height="80" rx="6" fill="#FFFFFF"/>
    <circle cx="0" cy="0" r="18" fill="none" stroke="#FFFFFF" stroke-width="11"/>
    <circle cx="0" cy="0" r="18" fill="none" stroke="url(#bg)" stroke-width="5"/>
    <rect x="-3" y="70" width="6" height="15" rx="3" fill="rgba(255,255,255,0.6)"/>
  </g>

  <!-- Text -->
  <text x="256" y="438" text-anchor="middle" font-family="Avenir-Heavy, Avenir, Helvetica Neue, Arial, sans-serif" font-weight="800" font-size="68" letter-spacing="-1">
    <tspan fill="#B91C1C">Casa</tspan><tspan fill="#FFFFFF" font-weight="900">Fix</tspan>
  </text>
</svg>
